# Replace /absolute/path/to/taskcircuit with this repository's absolute path.
[mcp_servers.taskcircuit]
command = "node"
args = [
  "/absolute/path/to/taskcircuit/dist/cli.js",
  "serve",
  "--db",
  "/absolute/path/to/taskcircuit/data/kanban.db",
]
required = true
startup_timeout_sec = 10
tool_timeout_sec = 30
